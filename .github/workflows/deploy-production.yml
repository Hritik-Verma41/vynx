name: Deploy Vynx Backend

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/apps/vynx/backend
            git fetch origin
            git reset --hard origin/production
            npm install
            npm run build
            pm2 reload vynx-backend || pm2 start dist/index.js --name vynx-backend
            pm2 save
